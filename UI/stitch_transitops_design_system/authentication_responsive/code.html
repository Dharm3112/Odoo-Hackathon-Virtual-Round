<!DOCTYPE html><html class="dark" lang="en"><head>

                        "surface-tint": "#c6c6c7",

                        "on-tertiary": "#2f3131"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    spacing: {
                        "margin": "24px",
                        "gutter": "16px",
                        "sidebar_width": "64px",
                        "header_height": "56px",
                        "container_gap": "12px"
                    },
                    fontFamily: {
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"],

                        "mono-data": ["13px", { "lineHeight": "1.4", "fontWeight": "400" }],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-surface-container-lowest text-on-background min-h-screen font-body-md antialiased overflow-hidden selection:bg-surface-bright selection:text-primary">
<!-- Main Container: 50/50 Split on Desktop, Stacked on Mobile -->
<main class="flex flex-col md:flex-row min-h-screen w-full">
<!-- Left Pane: Branding & Info (Elevated Gray Background) -->
<section class="w-full md:w-1/2 bg-[#000000] flex flex-col justify-center p-8 md:p-16 lg:p-24 relative overflow-hidden">
<!-- Branding Container -->
<div class="relative z-10 max-w-lg mx-auto md:mx-0 w-full h-full flex flex-col justify-center gap-12">
<!-- Logo & Tagline -->
<div>
<h1 class="text-6xl md:text-7xl lg:text-8xl font-bold tracking-tight text-primary mb-4" style="letter-spacing: -0.04em;">TransitOps</h1>
<p class="font-headline-md text-headline-md text-on-surface-variant font-normal">Smart Transport Operations Platform</p>
</div>
<!-- Roles List -->
<div class="flex flex-col gap-6 w-full max-w-sm mt-8">
<!-- Role 1 -->
<div class="flex items-center gap-4 py-3 border-b border-surface-variant">
<span class="material-symbols-outlined text-outline" style="font-size: 28px;">account_tree</span>
<span class="font-headline-sm text-headline-sm text-outline font-normal">Fleet Manager</span>
</div>
<!-- Role 2 -->
<div class="flex items-center gap-4 py-3 border-b border-surface-variant">
<span class="material-symbols-outlined text-outline" style="font-size: 28px;">navigation</span>
<span class="font-headline-sm text-headline-sm text-outline font-normal">Dispatcher</span>
</div>
<!-- Role 3 -->
<div class="flex items-center gap-4 py-3 border-b border-surface-variant">
<span class="material-symbols-outlined text-outline" style="font-size: 28px;">verified_user</span>
<span class="font-headline-sm text-headline-sm text-outline font-normal">Safety Officer</span>
</div>
<!-- Role 4 -->
<div class="flex items-center gap-4 py-3 border-b border-surface-variant">
<span class="material-symbols-outlined text-outline" style="font-size: 28px;">pie_chart</span>
<span class="font-headline-sm text-headline-sm text-outline font-normal">Financial Analyst</span>
</div>
</div>
</div>
</section>
<!-- Right Pane: Authentication Form (Pure Black Background) -->
<section class="w-full md:w-1/2 bg-[#0a0a0a] flex flex-col items-center justify-center p-8 md:p-16 relative">
<!-- Form Container - Glass/Elevated Look -->
<div class="w-full max-w-md bg-surface border border-surface-variant rounded-xl p-8 shadow-2xl relative z-10 backdrop-blur-xl bg-opacity-80">
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="email">Email</label>
<div class="relative">
<input class="w-full bg-[#181818] border border-surface-variant rounded text-on-surface px-4 py-3 font-body-md text-body-md placeholder:text-outline-variant focus:outline-none focus:border-primary focus:ring-0 transition-colors" id="email" name="email" placeholder="Email" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="relative">
<input class="w-full bg-[#181818] border border-surface-variant rounded text-on-surface px-4 py-3 font-body-md text-body-md placeholder:text-outline-variant focus:outline-none focus:border-primary focus:ring-0 transition-colors" id="password" name="password" placeholder="Password" required="" type="password">
</div>
</div>
<!-- Utilities (Remember Me & Forgot Password) -->
<div class="flex items-center justify-between mt-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded-sm bg-[#181818] border-surface-variant text-primary focus:ring-0 focus:ring-offset-0 checked:bg-primary checked:border-primary transition-colors cursor-pointer" type="checkbox">
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-body-sm text-body-sm text-outline hover:text-primary transition-colors underline decoration-outline-variant hover:decoration-primary underline-offset-4" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<button class="mt-4 w-full bg-[#393939] hover:bg-[#4a4a4a] text-on-surface font-body-md text-body-md font-medium py-3 px-4 rounded transition-colors duration-200 flex items-center justify-center gap-2" type="submit">
                        Authenticate
                    </button>
</form>
</div>
</section>
</main>
<script>
        // Simple script to handle input focus states for custom styling if needed beyond tailwind classes
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', (e) => {
                e.target.parentElement.classList.add('focused');
            });
            input.addEventListener('blur', (e) => {
                e.target.parentElement.classList.remove('focused');
            });
        });
    </script>
</body></html>
